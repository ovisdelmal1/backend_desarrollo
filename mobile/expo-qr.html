<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loté — Escanear QR Expo Go</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #A8C9E0;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #5C2A20;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      max-width: 360px;
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { margin: 0 0 24px; color: #666; line-height: 1.5; }
    img { width: 280px; height: 280px; }
    code {
      display: block;
      margin-top: 20px;
      padding: 12px;
      background: #f4f4f4;
      border-radius: 8px;
      font-size: 13px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Loté — Expo Go</h1>
    <p>Abrí la <strong>Cámara</strong> del iPhone y escaneá este código.<br />Se abrirá en Expo Go.</p>
    <img src="expo-qr.png" alt="QR Expo Go" />
    <code>exp://192.168.1.47:8081</code>
    <p style="margin-top:16px;font-size:13px">PC e iPhone en la misma Wi‑Fi</p>
  </div>
</body>
</html>
